bundle:
  name: ais-anomaly-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
      root_path: /Workspace/Users/simone.lima97@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt tasks"
    default: "dfaee2d99ca6e1e1"

resources:
  jobs:

    # Runs hourly until all 2024 data is loaded (script exits cleanly when done)
    ais_ingest:
      name: "AIS Ingest Bronze"
      schedule:
        quartz_cron_expression: "0 0 * ? * *"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ais
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/01_ingest_ais_bronze.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - zstandard
              - requests
              - pandas

    # Run manually once bronze.ais_raw is fully loaded
    ais_pipeline:
      name: "AIS Anomaly Pipeline"
      tasks:
        - task_key: ingest_sanctions
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/02_ingest_sanctions_bronze.py
          environment_key: default

        - task_key: dbt_transform
          depends_on:
            - task_key: ingest_sanctions
          dbt_task:
            project_directory: ${workspace.file_path}/dbt
            commands:
              - dbt run
            warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: ml_scoring
          depends_on:
            - task_key: dbt_transform
          spark_python_task:
            python_file: ${workspace.file_path}/ml/isolation_forest.py
          environment_key: default

        - task_key: send_alert
          depends_on:
            - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/alerts/send_alert.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
              - pandas
              - dbt-databricks
