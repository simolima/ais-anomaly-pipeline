bundle:
  name: ais-anomaly-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
      root_path: /Workspace/Users/simone.lima97@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt tasks"
    default: "dfaee2d99ca6e1e1"

resources:
  jobs:

    # Runs hourly until all 2024 data is loaded; both ingestion scripts run in parallel
    ais_ingest:
      name: "AIS Ingest Bronze"
      schedule:
        quartz_cron_expression: "0 0 * ? * *"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ais
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/01_ingest_ais_bronze.py
          environment_key: default

        - task_key: ingest_sanctions
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/02_ingest_sanctions_bronze.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - zstandard
              - requests
              - pandas

    # Normal operation: runs daily and processes a rolling last-7-days window
    # (rolling_days=7), so late-arriving data and boundary anomalies are continuously
    # refreshed (replace_where is idempotent). The schedule is PREPARED but PAUSED —
    # flip pause_status to UNPAUSED when ready to go live.
    #
    # Window resolution (see dbt/macros/ais_window.sql):
    #   - scheduled run        -> start_date/end_date empty, rolling_days=7  -> [today-7, today]
    #   - manual reprocess     -> set start_date/end_date params             -> explicit window
    # Empty string params count as "not set", so explicit dates override the rolling window.
    ais_dbt:
      name: "AIS dbt Transform"
      schedule:
        quartz_cron_expression: "0 0 6 * ? * *"
        timezone_id: "UTC"
        pause_status: PAUSED
      parameters:
        - name: rolling_days
          default: "7"
        - name: start_date
          default: ""
        - name: end_date
          default: ""
      tasks:
        - task_key: dbt_transform
          dbt_task:
            project_directory: ${workspace.file_path}/dbt
            commands:
              - "dbt run  --vars '{\"start_date\": \"{{job.parameters.start_date}}\", \"end_date\": \"{{job.parameters.end_date}}\", \"rolling_days\": \"{{job.parameters.rolling_days}}\"}'"
              - "dbt test --vars '{\"start_date\": \"{{job.parameters.start_date}}\", \"end_date\": \"{{job.parameters.end_date}}\", \"rolling_days\": \"{{job.parameters.rolling_days}}\"}'"
            warehouse_id: ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - dbt-databricks

    # Run manually after ais_dbt completes
    ais_ml:
      name: "AIS ML Scoring"
      tasks:
        - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/ml/isolation_forest.py
          environment_key: default

        - task_key: send_alert
          depends_on:
            - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/alerts/send_alert.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
              - pandas
