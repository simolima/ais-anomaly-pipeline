bundle:
  name: ais-anomaly-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
      root_path: /Workspace/Users/simone.lima97@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt tasks"
    default: "dfaee2d99ca6e1e1"

resources:
  jobs:

    # Runs hourly until all 2024 data is loaded; both ingestion scripts run in parallel
    ais_ingest:
      name: "AIS Ingest Bronze"
      schedule:
        quartz_cron_expression: "0 0 * ? * *"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ais
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/01_ingest_ais_bronze.py
          environment_key: default

        - task_key: ingest_sanctions
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/02_ingest_sanctions_bronze.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - zstandard
              - requests
              - pandas

    # Run manually after ais_ingest completes.
    # Pass the window via job parameters; replace_where deletes+reinserts only [start,end].
    # Defaults (2999-01-01) make a no-arg run a safe no-op — always set the dates.
    ais_dbt:
      name: "AIS dbt Transform"
      parameters:
        - name: start_date
          default: "2999-01-01"
        - name: end_date
          default: "2999-01-01"
      tasks:
        - task_key: dbt_transform
          dbt_task:
            project_directory: ${workspace.file_path}/dbt
            commands:
              - "dbt run  --vars '{\"start_date\": \"{{job.parameters.start_date}}\", \"end_date\": \"{{job.parameters.end_date}}\"}'"
              - "dbt test --vars '{\"start_date\": \"{{job.parameters.start_date}}\", \"end_date\": \"{{job.parameters.end_date}}\"}'"
            warehouse_id: ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - dbt-databricks

    # Run manually after ais_dbt completes
    ais_ml:
      name: "AIS ML Scoring"
      tasks:
        - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/ml/isolation_forest.py
          environment_key: default

        - task_key: send_alert
          depends_on:
            - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/alerts/send_alert.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
              - pandas
