bundle:
  name: ais-anomaly-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
      root_path: /Workspace/Users/simone.lima97@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt tasks"
    default: "dfaee2d99ca6e1e1"

resources:
  jobs:

    # All 2024 bronze data is loaded — the backfill is complete, so there is no schedule:
    # this is now a manual-only job. Re-run manually only to refresh bronze.sanctions
    # (overwrite) or to backfill any missing AIS window. Each run advances one 7-day window;
    # both ingestion scripts run in parallel.
    ais_ingest:
      name: "AIS Ingest Bronze"
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ais
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/01_ingest_ais_bronze.py
          environment_key: default

        - task_key: ingest_sanctions
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/02_ingest_sanctions_bronze.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - zstandard
              - requests
              - pandas

    # All 2024 windows are transformed (the watermark in silver.dbt_window_state is past
    # 2024-12-31), so the backfill walk is done and there is no schedule — this is now a
    # manual-only job. compute_window now emits the 2999 sentinel and the run no-ops, so a
    # scheduled run would only burn compute doing nothing. Trigger manually to reprocess a
    # specific window with the start_date/end_date job params set; compute_window reads the
    # watermark and sets the start_date/end_date task values when no params are given.
    ais_dbt:
      name: "AIS dbt Transform"
      parameters:
        - name: start_date
          default: ""
        - name: end_date
          default: ""
      tasks:
        - task_key: compute_window
          spark_python_task:
            python_file: ${workspace.file_path}/orchestration/compute_window.py
            parameters:
              - "{{job.parameters.start_date}}"
              - "{{job.parameters.end_date}}"
          environment_key: default

        - task_key: dbt_transform
          depends_on:
            - task_key: compute_window
          dbt_task:
            project_directory: ${workspace.file_path}/dbt
            # Make Databricks generate the dbt profiles.yml WITH a catalog. Without this the
            # generated profile (target 'databricks_cluster') has no catalog, so the session
            # default falls back to the disabled hive_metastore: unqualified ops (schema
            # creation, metadata lookups) then fail with UC_HIVE_METASTORE_DISABLED even
            # though every relation is pinned to workspace via +database. Pinning relations
            # is necessary but NOT sufficient — the session default catalog must be set too.
            catalog: workspace
            schema: bronze
            # dbt test is intentionally NOT run here: generic tests (not_null,
            # accepted_values) scan the whole persisted relation regardless of --vars, so
            # running them every windowed run would full-scan the 2B-row tables. Run
            # `dbt test` separately (manually or on a full validation), or add window-aware
            # `where` configs before adding it back to the per-window schedule.
            commands:
              - "dbt run --vars '{\"start_date\": \"{{tasks.compute_window.values.start_date}}\", \"end_date\": \"{{tasks.compute_window.values.end_date}}\"}'"
            warehouse_id: ${var.warehouse_id}
          environment_key: default

        # Advances the watermark only after dbt_transform succeeds (Databricks starts this
        # task only on upstream success), so a partial failure does not skip the window.
        - task_key: commit_window
          depends_on:
            - task_key: dbt_transform
          spark_python_task:
            python_file: ${workspace.file_path}/orchestration/commit_window.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - dbt-databricks

    # Run manually after ais_dbt completes
    ais_ml:
      name: "AIS ML Scoring"
      tasks:
        - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/ml/isolation_forest.py
          environment_key: default

        - task_key: send_alert
          depends_on:
            - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/alerts/send_alert.py
            parameters:
              - ${workspace.file_path}/config/alert_recipients.csv
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
              - pandas
