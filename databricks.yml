bundle:
  name: ais-anomaly-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-f2967afc-a9f1.cloud.databricks.com
      root_path: /Workspace/Users/simone.lima97@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt tasks"
    default: "dfaee2d99ca6e1e1"

resources:
  jobs:

    # Runs hourly until all 2024 data is loaded; both ingestion scripts run in parallel
    ais_ingest:
      name: "AIS Ingest Bronze"
      schedule:
        quartz_cron_expression: "0 0 * ? * *"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ais
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/01_ingest_ais_bronze.py
          environment_key: default

        - task_key: ingest_sanctions
          spark_python_task:
            python_file: ${workspace.file_path}/ingestion/02_ingest_sanctions_bronze.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - zstandard
              - requests
              - pandas

    # Normal operation: runs daily and advances ONE 7-day window per run through 2024,
    # starting from the max date already transformed into silver.ais_clean (mirrors the
    # bronze ingestion). Trigger it repeatedly (or let the schedule fire daily) to walk
    # the whole year a week at a time; once 2024 is fully transformed it no-ops.
    # The schedule is PREPARED but PAUSED — flip pause_status to UNPAUSED when going live.
    #
    # Window resolution:
    #   - compute_window reads the watermark and sets start_date/end_date task values
    #   - to reprocess a specific window, trigger with the start_date/end_date job params set
    ais_dbt:
      name: "AIS dbt Transform"
      schedule:
        quartz_cron_expression: "0 0 6 * ? * *"
        timezone_id: "UTC"
        pause_status: PAUSED
      parameters:
        - name: start_date
          default: ""
        - name: end_date
          default: ""
      tasks:
        - task_key: compute_window
          spark_python_task:
            python_file: ${workspace.file_path}/orchestration/compute_window.py
            parameters:
              - "{{job.parameters.start_date}}"
              - "{{job.parameters.end_date}}"
          environment_key: default

        - task_key: dbt_transform
          depends_on:
            - task_key: compute_window
          dbt_task:
            project_directory: ${workspace.file_path}/dbt
            commands:
              - "dbt run  --vars '{\"start_date\": \"{{tasks.compute_window.values.start_date}}\", \"end_date\": \"{{tasks.compute_window.values.end_date}}\"}'"
              - "dbt test --vars '{\"start_date\": \"{{tasks.compute_window.values.start_date}}\", \"end_date\": \"{{tasks.compute_window.values.end_date}}\"}'"
            warehouse_id: ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - dbt-databricks

    # Run manually after ais_dbt completes
    ais_ml:
      name: "AIS ML Scoring"
      tasks:
        - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/ml/isolation_forest.py
          environment_key: default

        - task_key: send_alert
          depends_on:
            - task_key: ml_scoring
          spark_python_task:
            python_file: ${workspace.file_path}/alerts/send_alert.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
              - pandas
